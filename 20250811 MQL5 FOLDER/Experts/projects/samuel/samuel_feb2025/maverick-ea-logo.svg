<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="#1a2c42" />
  <circle cx="200" cy="200" r="180" fill="#0d1829" stroke="#3498db" stroke-width="2" />
  
  <!-- Inner Trading Chart Pattern -->
  <g transform="translate(80, 120) scale(0.6)">
    <!-- Candlestick Chart Pattern -->
    <path d="M30,180 L30,100 L60,100 L60,180 Z" fill="#27ae60" />
    <line x1="45" y1="80" x2="45" y2="100" stroke="#27ae60" stroke-width="4" />
    <line x1="45" y1="180" x2="45" y2="200" stroke="#27ae60" stroke-width="4" />
    
    <path d="M80,160 L80,120 L110,120 L110,160 Z" fill="#e74c3c" />
    <line x1="95" y1="100" x2="95" y2="120" stroke="#e74c3c" stroke-width="4" />
    <line x1="95" y1="160" x2="95" y2="220" stroke="#e74c3c" stroke-width="4" />
    
    <path d="M130,190 L130,130 L160,130 L160,190 Z" fill="#27ae60" />
    <line x1="145" y1="110" x2="145" y2="130" stroke="#27ae60" stroke-width="4" />
    <line x1="145" y1="190" x2="145" y2="210" stroke="#27ae60" stroke-width="4" />
    
    <path d="M180,150 L180,100 L210,100 L210,150 Z" fill="#e74c3c" />
    <line x1="195" y1="80" x2="195" y2="100" stroke="#e74c3c" stroke-width="4" />
    <line x1="195" y1="150" x2="195" y2="180" stroke="#e74c3c" stroke-width="4" />
    
    <path d="M230,170 L230,110 L260,110 L260,170 Z" fill="#27ae60" />
    <line x1="245" y1="90" x2="245" y2="110" stroke="#27ae60" stroke-width="4" />
    <line x1="245" y1="170" x2="245" y2="190" stroke="#27ae60" stroke-width="4" />
    
    <path d="M280,140 L280,90 L310,90 L310,140 Z" fill="#27ae60" />
    <line x1="295" y1="70" x2="295" y2="90" stroke="#27ae60" stroke-width="4" />
    <line x1="295" y1="140" x2="295" y2="160" stroke="#27ae60" stroke-width="4" />
    
    <path d="M330,160 L330,120 L360,120 L360,160 Z" fill="#e74c3c" />
    <line x1="345" y1="100" x2="345" y2="120" stroke="#e74c3c" stroke-width="4" />
    <line x1="345" y1="160" x2="345" y2="190" stroke="#e74c3c" stroke-width="4" />
    
    <!-- Trendline -->
    <path d="M30,140 C80,160 130,120 190,110 S260,90 370,140" fill="none" stroke="#f1c40f" stroke-width="3" stroke-dasharray="5,5" />
  </g>
  
  <!-- Protective Shield Outline representing hedging -->
  <path d="M200,70 L120,120 L120,210 Q200,280 280,210 L280,120 Z" fill="none" stroke="#3498db" stroke-width="5" stroke-linejoin="round" />
  
  <!-- M letter stylized as a maverick symbol -->
  <path d="M150,140 L170,190 L200,130 L230,190 L250,140" fill="none" stroke="#f1c40f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Text -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#ffffff">MAVERICK</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#3498db">EXPERT ADVISOR</text>
  <text x="200" y="305" font-family="Arial, sans-serif" font-size="14" font-style="italic" text-anchor="middle" fill="#f1c40f">Hedging System</text>
</svg>
