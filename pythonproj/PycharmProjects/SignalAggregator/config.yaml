# Optional symbol mapping
# symbol_mapping:
#   STEPINDEX500: STEP500 # Example mapping if needed by MQL5

# --- Add other top-level sections if needed (e.g., symbol_mapping) ---
symbol_mapping:
   #currencies
   AUD/USD: AUDUSD
   USD/JPY: USDJPY
   EUR/USD: EURUSD
   EUR/GBP: EURGBP
   CHF/JPY: CHFJPY
   EUR/CHF: EURCHF
   GBP/USD: GBPUSD
   GBP/CAD: GBPCAD
   NZD/USD: NZDUSD
   GBP/JPY: GBPJPY         # Common, but check if suffix like .m needed
   USDCADm: USDCAD
   #metals
   SILVER: XAGUSD          # Replace XAGUSD if your broker uses something else
   GOLD: XAUUSD
   #indices
   US500 SPOT: US SP 500       # Replace US500 if needed (e.g., SPX500, USA500)
   US100 SPOT: US Tech 100
   US30 SPOT: Wall Street 30
   GERMANY40 SPOT: Germany 40
   WHEAT FUTURES: WHEAT    # Replace WHEAT if needed (e.g., ZW, WHEAT.f)
   HONG KONG 50: Hong Kong 50        # Replace HK50 if needed (e.g., HKG50)
   #energies
   OIL SPOT: US Oil
   BRENT OIL: UK Brent Oil
   #synthetics
   STEPINDEX200: Step Index 200
   STEPINDEX300: Step Index 300
   STEPINDEX400: Step Index 400
   STEPINDEX500: Step Index 500


