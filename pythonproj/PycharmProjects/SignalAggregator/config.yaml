    type: TelegramFormat2Parser # <<< Class name for format 2

 # --- ADDED REDFOX PARSER CONFIG ---
  telegram_format_3:         # Config ID referenced by source
    type: TelegramFormat3Parser # <<< Class name for format 3

 # --- ADDED FXMPrivateClub PARSER CONFIG ---
