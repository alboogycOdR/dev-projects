# Forex Arbitrage Trading System Configuration (Refactored)
# =========================================================
# Summary of Key Changes:
# REMOVED: The synthesis_pairs key is gone because it's now generated automatically in the code.
# ADDED: core_currencies is the new, primary way to control which symbols the bot analyzes.
# RENAMED & IMPROVED: min_spread_threshold is now min_spread_pips, which is a much more robust and universal way to define the trigger condition.
# UPDATED: analysis_interval is renamed to analysis_interval_seconds for clarity and set to a high-frequency default of 0.1.

[DEFAULT]
# --- Connection ---
# Adjust this path according to your MT5 installation
terminal_path = C:/Program Files/MetaTrader 5/terminal64.exe

# --- Arbitrage Logic ---
# Core currencies used to programmatically generate all arbitrage triangles.
# Add or remove currencies here to change the scope of the search.
core_currencies = EUR,USD,GBP,JPY,CHF,AUD,NZD,CAD

# The minimum required spread in PIPS to trigger a trade.
min_spread_pips = 8.0

# Interval in seconds for the live trading loop.
# Use small fractional values for high frequency.
analysis_interval_seconds = 0.1

# --- Trading Parameters ---
max_open_trades = 10
volume = 0.50
take_profit_pips = 450
stop_loss_pips = 200
magic_number = 123456

# --- Risk and Time Management ---
enable_trading_hours = true
trading_start_time = 05:00
trading_end_time = 23:30

# --- Backtesting Configuration ---
initial_balance = 10000.0
# Shorter date range is better for initial tests.
backtest_start_date = 2024-01-01
backtest_end_date = 2024-01-10

# --- Logging ---
log_level = INFO
log_file = arbitrage_system.log